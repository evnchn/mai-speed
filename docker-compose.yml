services:
  web:
    build: .
    ports:
      - "10000:10000"
    volumes:
      - cache-data:/app/cache
    mem_limit: 512m
    restart: unless-stopped

  updater:
    build: .
    command: ["python", "dark_repulser.py"]
    volumes:
      - cache-data:/app/cache
    mem_limit: 512m
    restart: unless-stopped

volumes:
  cache-data:
